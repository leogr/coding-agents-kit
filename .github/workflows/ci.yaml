# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-linux:
    name: Build & Test (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            hooks/claude-code/target
            plugins/coding-agent-plugin/target
            tools/coding-agents-kit-ctl/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Build
        run: make build

      - name: Download Falco
        run: |
          make download-falco-linux
          echo "${PWD}/$(make falco-linux-bin-dir)" >> "$GITHUB_PATH"

      - name: Verify Falco
        run: falco --version

      - name: Run interceptor tests
        run: make test-interceptor

      - name: Run e2e tests
        run: make test-e2e

  build-test-macos:
    name: Build & Test (macOS ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install cmake openssl@3
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            hooks/claude-code/target
            plugins/coding-agent-plugin/target
            tools/coding-agents-kit-ctl/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Cache Falco build
        uses: actions/cache@v4
        with:
          path: |
            build/falco-*-darwin-*
            build/falco-src-*
          key: falco-macos-${{ matrix.arch }}-${{ hashFiles('installers/macos/build-falco.sh', 'installers/macos/falco-macos-http-output.patch') }}

      - name: Build
        run: make build

      - name: Build Falco from source
        run: make falco-macos

      - name: Add Falco to PATH
        run: echo "${PWD}/$(make falco-macos-bin-dir)" >> "$GITHUB_PATH"

      - name: Verify Falco
        run: falco --version

      - name: Run interceptor tests
        run: make test-interceptor

      - name: Run e2e tests
        run: make test-e2e
