# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'output/**'
      - 'LICENSE'
      - '.claude-plugin/**'
      - 'skills/**'
      - 'TODOs.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'output/**'
      - 'LICENSE'
      - '.claude-plugin/**'
      - 'skills/**'
      - 'TODOs.md'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-linux:
    name: Build & Test (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Build
        run: make build

      - name: Download Falco
        run: |
          make download-falco-linux
          echo "${PWD}/$(make falco-linux-bin-dir)" >> "$GITHUB_PATH"

      - name: Verify Falco
        run: falco --version

      - name: Run interceptor tests
        run: make test-interceptor

      - name: Run e2e tests
        run: make test-e2e

  build-test-windows:
    name: Build & Test (Windows ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            vcpkg_triplet: x64-windows-static
          - arch: arm64
            runner: windows-11-arm
            vcpkg_triplet: arm64-windows-static
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install make
        run: choco install make -y

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          # GitHub-hosted Windows runners ship vcpkg at C:\vcpkg. Cache only
          # the `installed/<triplet>` subdir so a triplet change invalidates
          # independently.
          path: C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}
          key: vcpkg-${{ matrix.vcpkg_triplet }}-curl-${{ hashFiles('.github/workflows/ci.yaml') }}

      - name: Install vcpkg curl
        run: vcpkg install curl:${{ matrix.vcpkg_triplet }}

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Cache Falco build
        uses: actions/cache@v4
        with:
          path: |
            build/falco-*-windows-*
            build/falco-src-*
          key: falco-windows-${{ matrix.arch }}-${{ hashFiles('installers/windows/build-falco.ps1', 'installers/windows/falco-windows-*.patch') }}

      - name: Build
        run: make build

      - name: Build Falco from source
        run: make falco-windows-${{ matrix.arch }}

      - name: Run interceptor tests
        run: make test-interceptor

      - name: Run e2e tests
        run: make test-e2e

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix eula accept wix7

      - name: Build MSI
        run: >-
          powershell -NoProfile -ExecutionPolicy Bypass -File installers/windows/package.ps1
          -Arch ${{ matrix.arch }} -SkipRustBuild -SkipFalcoBuild

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-msi
          path: |
            build/out/*.msi
            build/out/Install-CodingAgentsKit.ps1
            build/out/Uninstall-CodingAgentsKit.ps1
          if-no-files-found: error

  build-test-macos:
    name: Build & Test (macOS ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install cmake openssl@3
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Cache Falco build
        uses: actions/cache@v4
        with:
          path: |
            build/falco-*-darwin-*
            build/falco-src-*
          key: falco-macos-${{ matrix.arch }}-${{ hashFiles('installers/macos/build-falco.sh', 'installers/macos/falco-macos-http-output.patch') }}

      - name: Build
        run: make build

      - name: Build Falco from source
        run: make falco-macos

      - name: Add Falco to PATH
        run: echo "${PWD}/$(make falco-macos-bin-dir)" >> "$GITHUB_PATH"

      - name: Verify Falco
        run: falco --version

      - name: Run interceptor tests
        run: make test-interceptor

      - name: Run e2e tests
        run: make test-e2e
